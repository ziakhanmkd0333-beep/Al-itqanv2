; PHP Configuration for Next.js streaming support
; Place this file in your root directory if your host supports custom php.ini

; Maximum execution time - increase for long-running RSC streams
max_execution_time = 120

; Input/output timeout
default_socket_timeout = 120

; Memory limit
memory_limit = 512M

; Disable output buffering for streaming
output_buffering = Off
zlib.output_compression = Off

; Upload limits
upload_max_filesize = 50M
post_max_size = 50M
